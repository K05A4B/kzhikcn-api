root = "."
temp_dir = ".tmp"

[build]
  cmd = "go build -o .tmp/kzhikcn.exe"
  bin = ".tmp/kzhikcn.exe"
  args_bin = ["-c", ".tmp/config.yml", "serve"]
  include_ext = ["go"]
  include_file = [".tmp/config.yml"]
  exclude_dir = ["tmp", "vendor", "toolkit"]
  exclude_file = []
  exclude_regex = ["_test.go"]

[log]
  time = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"


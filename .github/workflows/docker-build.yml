name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📖 Checkout repository
        uses: actions/checkout@v4

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: ⚙️ Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Get app version
        id: version
        run: |
          VERSION=$(jq -r '.version' internal/appinfo/app_info.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version: $VERSION"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.REGISTRY_USERNAME }}/kzhikcn-api:latest
            ${{ vars.REGISTRY_USERNAME }}/kzhikcn-api:${{ steps.version.outputs.version }}
            ghcr.io/${{ vars.REGISTRY_USERNAME }}/kzhikcn-api:latest
            ghcr.io/${{ vars.REGISTRY_USERNAME }}/kzhikcn-api:${{ steps.version.outputs.version }}
